<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Premium Royal Blue to Deep Indigo -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F52BA" />
      <stop offset="30%" stop-color="#083E9E" />
      <stop offset="100%" stop-color="#051C47" />
    </linearGradient>

    <!-- Accent Gradient: Green to Teal for Success/Growth -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F9D58" />
      <stop offset="100%" stop-color="#25E385" />
    </linearGradient>

    <!-- Gold Tassel Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#CC6600" />
    </linearGradient>

    <!-- Metallic Silver for Cap Highlights -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#A6B4C9" />
    </linearGradient>

    <!-- Inner Glow Ring Gradient -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
      <stop offset="85%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25" />
    </radialGradient>

    <!-- Soft Drop Shadow Filter for central elements -->
    <filter id="elementShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Background Card Gloss Overlay -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08" />
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>

    <!-- Outer Squircle Shadow -->
    <filter id="squircleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- One UI 8.5 Squircle Container -->
  <!-- Using exact mathematical superellipse path representing a premium One UI icon shape -->
  <path d="M 128,32 
           C 220,32 292,32 384,32 
           C 448,32 480,64 480,128 
           C 480,220 480,292 480,384 
           C 480,448 448,480 384,480 
           C 292,480 220,480 128,480 
           C 64,480 32,448 32,384 
           C 32,292 32,220 32,128 
           C 32,64 64,32 128,32 Z" 
        fill="url(#bgGrad)" 
        filter="url(#squircleShadow)" />

  <!-- Inner border ring / glow -->
  <path d="M 128,34 
           C 220,34 292,34 384,34 
           C 446,34 478,66 478,128 
           C 478,220 478,292 478,384 
           C 478,446 446,478 384,478 
           C 292,478 220,478 128,478 
           C 66,478 34,446 34,384 
           C 34,292 34,220 34,128 
           C 34,66 66,34 128,34 Z" 
        fill="url(#innerGlow)" />

  <!-- Diagonal Premium Gloss Overlay -->
  <path d="M 32,128 C 32,64 64,32 128,32 L 320,32 L 32,320 Z" fill="url(#glossGrad)" />

  <!-- Tech Grid Lines representing standard academic curriculum frameworks -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="2">
    <!-- Verticals -->
    <line x1="120" y1="32" x2="120" y2="480" />
    <line x1="208" y1="32" x2="208" y2="480" />
    <line x1="304" y1="32" x2="304" y2="480" />
    <line x1="392" y1="32" x2="392" y2="480" />
    <!-- Horizontals -->
    <line x1="32" y1="120" x2="480" y2="120" />
    <line x1="32" y1="208" x2="480" y2="208" />
    <line x1="32" y1="304" x2="480" y2="304" />
    <line x1="32" y1="392" x2="480" y2="392" />
  </g>

  <!-- Central Graphic Components (Cap & Trend Analysis Graph) -->
  <g filter="url(#elementShadow)" transform="translate(0, 15)">
    <!-- Base grid lines for the chart background -->
    <line x1="110" y1="330" x2="400" y2="330" stroke="#FFFFFF" stroke-width="3" opacity="0.15" stroke-linecap="round" />
    <line x1="110" y1="260" x2="400" y2="260" stroke="#FFFFFF" stroke-width="1.5" opacity="0.08" stroke-linecap="round" stroke-dasharray="6, 6" />
    <line x1="110" y1="190" x2="400" y2="190" stroke="#FFFFFF" stroke-width="1.5" opacity="0.08" stroke-linecap="round" stroke-dasharray="6, 6" />

    <!-- 3D Bar Charts for CIE Scores (Spacious & rounded) -->
    <!-- Bar 1 (CIE 1 - Pending/Intermediate) -->
    <rect x="135" y="240" width="24" height="90" rx="6" fill="#FFFFFF" opacity="0.2" />
    <rect x="135" y="240" width="24" height="12" rx="4" fill="#FFFFFF" opacity="0.3" /> <!-- Top Cap -->
    
    <!-- Bar 2 (CIE 2 - Achieved high) -->
    <rect x="195" y="180" width="24" height="150" rx="6" fill="#FFFFFF" opacity="0.35" />
    <rect x="195" y="180" width="24" height="12" rx="4" fill="#FFFFFF" opacity="0.5" />
    
    <!-- Bar 3 (Final Target - Gold/Teal success peak) -->
    <rect x="255" y="130" width="24" height="200" rx="6" fill="url(#accentGrad)" />
    <rect x="255" y="130" width="24" height="12" rx="4" fill="#FFFFFF" opacity="0.6" />

    <!-- Stylized One UI 8.5 Academic Graduation Cap -->
    <!-- Cap Diamond Shape -->
    <polygon points="268,105 378,135 268,165 158,135" fill="url(#silverGrad)" />
    <!-- Cap Inner Shadow/Reflection Line -->
    <polygon points="268,111 364,135 268,159 172,135" fill="#FFFFFF" opacity="0.25" />

    <!-- Tassel Cord & Bead (Premium gold gradient) -->
    <path d="M 268,135 L 360,175 L 360,215" fill="none" stroke="url(#goldGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="360" cy="222" r="8" fill="url(#goldGrad)" />
    <circle cx="360" cy="222" r="4" fill="#FFFFFF" opacity="0.4" />

    <!-- Under-Cap Solid Band / Support Ring -->
    <path d="M 198,155 L 198,185 C 198,198 338,198 338,185 L 338,155 C 322,163 292,168 268,168 C 244,168 214,163 198,155 Z" fill="#0A3E8A" opacity="0.9" />
    <path d="M 206,161 L 206,183 C 206,193 330,193 330,183 L 330,161 C 316,168 290,172 268,172 C 246,172 220,168 206,161 Z" fill="#FFFFFF" opacity="0.15" />

    <!-- Smooth Dynamic Analytics Growth Curve Line (Glowing White Line) -->
    <path d="M 105,310 C 160,290 220,220 268,168 C 310,120 355,80 395,65" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
    
    <!-- Glowing Arrow Head -->
    <path d="M 380,55 L 405,62 L 398,87 Z" fill="#FFFFFF" />

    <!-- Small Glowing Pulse Dots on the path intersections -->
    <circle cx="105" cy="310" r="4" fill="#FFFFFF" />
    <circle cx="147" cy="295" r="4" fill="#FFFFFF" />
    <circle cx="207" cy="235" r="5" fill="#FFFFFF" />
    <circle cx="267" cy="169" r="6" fill="#FFFFFF" />
  </g>
</svg>
